name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # The tool is stdlib-only, but PDF export shells out to a browser, and
        # that is the part most likely to differ per platform — so both run it.
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # The PDF tests skip themselves when no Chromium-family browser is present.
      # Installing one on Linux is what keeps them from silently never running.
      - name: Install Chromium (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y chromium-browser || sudo snap install chromium

      - name: Test
        run: pytest -q

      - name: Check the PDF tests actually ran
        run: pytest -q tests/test_pdf.py --no-header -rs | tee /tmp/pdf.txt; ! grep -q "no Chromium-family browser" /tmp/pdf.txt
        shell: bash
